<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tapports - İnsan Merkezli Teknolojik Yol Arkadaşı</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0d2233;
      color: #ffffff;
      min-height: 100vh;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* Background image */
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('image.jpg');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 80px 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    /* ─── LEFT SIDE ─── */
    .hero-left {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .hero-subtitle {
      font-size: 1.4rem;
      font-weight: 400;
      color: #e0e8f0;
      line-height: 1.4;
    }

    .hero-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hero-title span {
      font-size: 3rem;
      font-weight: 900;
      line-height: 1.1;
      color: #f0a500;
      letter-spacing: -0.5px;
    }

    .hero-desc {
      font-size: 1rem;
      font-weight: 400;
      color: #c0d0df;
      line-height: 1.7;
      max-width: 420px;
    }

    /* ─── RIGHT SIDE ─── */
    .hero-right {
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px 20px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 500;
      color: #ffffff;
      letter-spacing: 0.2px;
      min-height: 80px;
      background: transparent;
      cursor: default;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card-orange {
      border: 2.5px solid #f0a500;
      box-shadow: 0 0 0 0 rgba(240, 165, 0, 0);
    }

    .card-orange:hover {
      box-shadow: 0 4px 20px rgba(240, 165, 0, 0.25);
    }

    .card-white {
      border: 2.5px solid #ffffff;
      box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
    }

    .card-white:hover {
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
    }

    /* Book promo card */
    .book-promo {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(13, 34, 51, 0.55);
      border: 2.5px solid #ffffff;
      border-radius: 14px;
      padding: 18px 24px;
      max-width: 460px;
      margin-left: auto;
      backdrop-filter: blur(6px);
    }

    .book-promo-text {
      font-size: 1rem;
      font-weight: 500;
      color: #ffffff;
      line-height: 1.5;
      flex: 1;
    }

    .book-cover {
      width: 72px;
      height: 100px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: #1a3a52;
    }

    /* Book cover placeholder (until real image is provided) */
    .book-cover-placeholder {
      width: 72px;
      height: 100px;
      border-radius: 4px;
      flex-shrink: 0;
      background: linear-gradient(145deg, #1a3a52, #0d2233);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      gap: 6px;
    }

    .book-cover-placeholder .book-title-text {
      font-size: 0.55rem;
      font-weight: 700;
      color: #f0a500;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }

    .book-cover-placeholder .book-edition {
      font-size: 0.45rem;
      color: #90a8b8;
      text-align: center;
    }

    .book-cover-placeholder .book-divider {
      width: 40px;
      height: 1px;
      background: #f0a500;
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: 1fr;
        padding: 60px 32px;
        gap: 48px;
      }

      .hero-title span {
        font-size: 2.2rem;
      }

      .hero-subtitle {
        font-size: 1.1rem;
      }
    }

    @media (max-width: 540px) {
      .hero-inner {
        padding: 40px 20px;
      }

      .hero-title span {
        font-size: 1.8rem;
      }

      .cards-grid {
        gap: 12px;
      }

      .card {
        padding: 20px 14px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <!-- Background image — replace image.jpg with your file -->
    <div class="hero-bg"></div>

    <div class="hero-inner">

      <!-- LEFT: Text content -->
      <div class="hero-left">
        <p class="hero-subtitle">Şirketlerin Yapay Zeka Çağında</p>

        <div class="hero-title">
          <span>İnsan Merkezli</span>
          <span>Teknolojik Yol Arkadaşı</span>
        </div>

        <p class="hero-desc">
          Dijital tabanlı büyüme yolculuklarında<br>
          markalara rehberlik ediyoruz.
        </p>
      </div>

      <!-- RIGHT: Category cards + book promo -->
      <div class="hero-right">

        <div class="cards-grid">
          <!-- Row 1 -->
          <div class="card card-orange">Yapay Zeka</div>
          <div class="card card-white">Dijital Pazarlama</div>

          <!-- Row 2 -->
          <div class="card card-white">E-Ticaret</div>
          <div class="card card-orange">Lider İletişimi</div>

          <!-- Row 3 -->
          <div class="card card-orange">Eğitim</div>
          <div class="card card-white">Bloomberg<br>Business Week</div>
        </div>

        <!-- Book promo -->
        <div class="book-promo">
          <p class="book-promo-text">
            Kitabımız DnR ve<br>kitapyurdu.com'da!
          </p>
          <!-- Replace with <img src="book-cover.jpg" alt="Yapay Zeka Çağı" class="book-cover"> if you have the image -->
          <div class="book-cover-placeholder">
            <div class="book-title-text">YAPAY<br>ZEKA<br>ÇAĞI</div>
            <div class="book-divider"></div>
            <div class="book-edition">2. Baskı</div>
          </div>
        </div>

      </div>
    </div>
  </section>
</body>
</html>
